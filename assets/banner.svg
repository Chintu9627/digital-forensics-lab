<svg viewBox="0 0 1200 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0e27"/>
      <stop offset="50%" stop-color="#101b3d"/>
      <stop offset="100%" stop-color="#0a0e27"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="280" fill="url(#bg)"/>

  <!-- subtle grid texture -->
  <g stroke="#1e2a52" stroke-width="1">
    <line x1="0" y1="40" x2="1200" y2="40"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="150" y1="0" x2="150" y2="280"/>
    <line x1="1050" y1="0" x2="1050" y2="280"/>
  </g>

  <!-- circuit-style corner accents -->
  <g stroke="url(#accent)" stroke-width="2" fill="none" opacity="0.7">
    <path d="M 30 30 L 30 70 L 70 70"/>
    <path d="M 1170 30 L 1170 70 L 1130 70"/>
    <path d="M 30 250 L 30 210 L 70 210"/>
    <path d="M 1170 250 L 1170 210 L 1130 210"/>
  </g>
  <circle cx="30" cy="30" r="4" fill="#22d3ee"/>
  <circle cx="1170" cy="30" r="4" fill="#34d399"/>
  <circle cx="30" cy="250" r="4" fill="#34d399"/>
  <circle cx="1170" cy="250" r="4" fill="#22d3ee"/>

  <!-- magnifying glass icon -->
  <g transform="translate(165, 70)" stroke="url(#accent)" stroke-width="5" fill="none" stroke-linecap="round">
    <circle cx="18" cy="18" r="16"/>
    <line x1="30" y1="30" x2="44" y2="44"/>
  </g>

  <!-- title -->
  <text x="615" y="110" font-family="Consolas, 'Courier New', monospace" font-size="46" font-weight="700" fill="#f1f5f9" text-anchor="middle">
    Digital Forensic Analysis Lab
  </text>
  <text x="600" y="148" font-family="Consolas, 'Courier New', monospace" font-size="18" fill="#94a3b8" text-anchor="middle">
    Memory · Disk · Artifact Analysis — from the terminal or the browser
  </text>

  <!-- four module labels with simple geometric icons -->
  <g font-family="Consolas, 'Courier New', monospace" font-size="15" fill="#22d3ee">
    <rect x="175" y="189" width="14" height="14" rx="2" fill="none" stroke="#22d3ee" stroke-width="2"/>
    <text x="270" y="200" text-anchor="middle">MEMORY</text>

    <circle cx="450" cy="196" r="7" fill="none" stroke="#22d3ee" stroke-width="2"/>
    <text x="510" y="200" text-anchor="middle">DISK</text>

    <path d="M 680 190 L 693 190 L 697 195 L 708 195 L 708 204 L 680 204 Z" fill="none" stroke="#22d3ee" stroke-width="2"/>
    <text x="765" y="200" text-anchor="middle">ARTIFACTS</text>

    <circle cx="940" cy="196" r="8" fill="none" stroke="#22d3ee" stroke-width="2"/>
    <circle cx="940" cy="196" r="2.5" fill="#22d3ee"/>
    <text x="1010" y="200" text-anchor="middle">TECHNIQUES</text>
  </g>
  <g stroke="#334155" stroke-width="1">
    <line x1="355" y1="190" x2="355" y2="215"/>
    <line x1="600" y1="190" x2="600" y2="215"/>
    <line x1="845" y1="190" x2="845" y2="215"/>
  </g>
</svg>
